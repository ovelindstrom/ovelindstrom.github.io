<style>
    #cookie-notice {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        box-sizing: border-box;
        padding: 0.9rem 1.25rem;
        z-index: 200;
        text-align: center;
        background: #1a1a1a;
        color: #f7f5f0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        box-shadow: 0 -2px 14px rgba(0, 0, 0, 0.28);
    }
    #cookie-notice span { color: #f7f5f0; }
    #cookie-notice a {
        display: inline-block;
        cursor: pointer;
        margin-left: 0.5rem;
        padding: 6px 14px;
        border-radius: 3px;
        border: 1px solid rgba(247, 245, 240, 0.4);
        background: transparent;
        color: #f7f5f0;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition: background .15s ease, color .15s ease, border-color .15s ease;
    }
    #cookie-notice a:hover { border-color: #f7f5f0; color: #ffffff; }
    #cookie-notice #cookie-notice-accept {
        background: #e85d3a;
        border-color: #e85d3a;
        color: #ffffff;
    }
    #cookie-notice #cookie-notice-accept:hover {
        background: #cf4a2a;
        border-color: #cf4a2a;
        color: #ffffff;
    }
    @media (max-width: 767px) {
        #cookie-notice span { display: block; margin-bottom: 0.85rem; }
        #cookie-notice a { margin: 0 0.25rem; }
    }
</style>
<div id="cookie-notice"><span>Jag använder cookies för att föra statistik. Är det okej med dig?</span><a id="cookie-notice-accept" class="btn btn-primary btn-sm">Godkänn</a><a id="cookie-notice-deny" class="btn btn-primary btn-sm">Nej tack</a><a href="/privacy" class="btn btn-primary btn-sm">Mer information</a></div>
<script src="{{ site.baseurl }}/assets/cookie-consent.js" type="text/javascript"></script>
